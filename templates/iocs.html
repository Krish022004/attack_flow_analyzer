<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOCs - Attack Flow Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Attack Flow Analyzer</span>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
                <a href="/upload" class="btn btn-outline-light btn-sm me-2">Upload Logs</a>
                <a href="/timeline" class="btn btn-outline-light btn-sm me-2">Timeline</a>
                <a href="/phases" class="btn btn-outline-light btn-sm me-2">Phases</a>
                <a href="/iocs" class="btn btn-outline-light btn-sm">IOCs</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">Indicators of Compromise (IOCs)</h1>

        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Export IOCs</h5>
                        <div>
                            <a href="/export/iocs/json" class="btn btn-primary btn-sm me-2">Export JSON</a>
                            <a href="/export/iocs/csv" class="btn btn-success btn-sm">Export CSV</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Filter IOCs</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <label for="type-filter" class="form-label">Type</label>
                                <select class="form-select" id="type-filter">
                                    <option value="">All Types</option>
                                    <option value="ip">IP Address</option>
                                    <option value="domain">Domain</option>
                                    <option value="hash">Hash</option>
                                    <option value="url">URL</option>
                                    <option value="user_agent">User Agent</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="phase-filter" class="form-label">Phase</label>
                                <select class="form-select" id="phase-filter">
                                    <option value="">All Phases</option>
                                    <option value="reconnaissance">Reconnaissance</option>
                                    <option value="initial_access">Initial Access</option>
                                    <option value="lateral_movement">Lateral Movement</option>
                                    <option value="exfiltration">Exfiltration</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="search" class="form-label">Search</label>
                                <input type="text" class="form-control" id="search" placeholder="Search IOCs...">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>IOC List</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover" id="iocs-table">
                        <thead>
                            <tr>
                                <th>Value</th>
                                <th>Type</th>
                                <th>First Seen</th>
                                <th>Last Seen</th>
                                <th>Event Count</th>
                                <th>Associated Phases</th>
                            </tr>
                        </thead>
                        <tbody id="iocs-tbody">
                        </tbody>
                    </table>
                </div>
                <div id="no-iocs" class="alert alert-info" style="display: none;">
                    No IOCs found. Please upload and analyze logs first.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allIOCs = [];

        async function loadIOCs() {
            try {
                const response = await fetch('/api/iocs');
                const data = await response.json();
                
                if (data.length === 0) {
                    document.getElementById('no-iocs').style.display = 'block';
                    return;
                }

                allIOCs = data;
                displayIOCs(allIOCs);
            } catch (error) {
                console.error('Error loading IOCs:', error);
            }
        }

        function displayIOCs(iocs) {
            const tbody = document.getElementById('iocs-tbody');
            tbody.innerHTML = '';

            if (iocs.length === 0) {
                document.getElementById('no-iocs').style.display = 'block';
                return;
            }

            document.getElementById('no-iocs').style.display = 'none';

            iocs.forEach(ioc => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><code>${ioc.value}</code></td>
                    <td><span class="badge bg-primary">${ioc.type}</span></td>
                    <td>${ioc.first_seen ? new Date(ioc.first_seen).toLocaleString() : '-'}</td>
                    <td>${ioc.last_seen ? new Date(ioc.last_seen).toLocaleString() : '-'}</td>
                    <td>${ioc.event_count || 0}</td>
                    <td>${(ioc.associated_phases || []).join(', ') || '-'}</td>
                `;
            });
        }

        function filterIOCs() {
            const typeFilter = document.getElementById('type-filter').value;
            const phaseFilter = document.getElementById('phase-filter').value;
            const searchTerm = document.getElementById('search').value.toLowerCase();

            let filtered = allIOCs.filter(ioc => {
                if (typeFilter && ioc.type !== typeFilter) return false;
                if (phaseFilter && !(ioc.associated_phases || []).includes(phaseFilter)) return false;
                if (searchTerm && !ioc.value.toLowerCase().includes(searchTerm)) return false;
                return true;
            });

            displayIOCs(filtered);
        }

        document.getElementById('type-filter').addEventListener('change', filterIOCs);
        document.getElementById('phase-filter').addEventListener('change', filterIOCs);
        document.getElementById('search').addEventListener('input', filterIOCs);

        loadIOCs();
    </script>
</body>
</html>
