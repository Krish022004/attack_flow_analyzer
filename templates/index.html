<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attack Flow Analyzer - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Attack Flow Analyzer</span>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
                <a href="/upload" class="btn btn-outline-light btn-sm me-2">Upload Logs</a>
                <a href="/timeline" class="btn btn-outline-light btn-sm me-2">Timeline</a>
                <a href="/phases" class="btn btn-outline-light btn-sm me-2">Phases</a>
                <a href="/iocs" class="btn btn-outline-light btn-sm">IOCs</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">Dashboard</h1>

        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Quick Actions</h5>
                    </div>
                    <div class="card-body">
                        <a href="/upload" class="btn btn-primary me-2">Upload Log Files</a>
                        <button class="btn btn-secondary" onclick="generateSamples()">Generate Sample Logs</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" id="statistics">
            <div class="col-md-3 mb-4">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">Total Events</h5>
                        <h2 id="total-events">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">Correlation Groups</h5>
                        <h2 id="correlation-groups">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card text-white bg-warning">
                    <div class="card-body">
                        <h5 class="card-title">Attack Phases</h5>
                        <h2 id="attack-phases">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card text-white bg-danger">
                    <div class="card-body">
                        <h5 class="card-title">IOCs Detected</h5>
                        <h2 id="iocs-detected">-</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Phase Distribution</h5>
                    </div>
                    <div class="card-body">
                        <div id="phase-chart"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Recent Analysis</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">Upload log files and run analysis to see results here.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <script>
        async function loadStatistics() {
            try {
                const response = await fetch('/api/statistics');
                const stats = await response.json();
                
                if (stats.ingestion) {
                    document.getElementById('total-events').textContent = stats.ingestion.total_events || 0;
                }
                if (stats.correlation) {
                    document.getElementById('correlation-groups').textContent = stats.correlation.total_groups || 0;
                }
                if (stats.phases) {
                    const phaseCount = Object.keys(stats.phases).length;
                    document.getElementById('attack-phases').textContent = phaseCount;
                }
                if (stats.iocs) {
                    document.getElementById('iocs-detected').textContent = stats.iocs.total_iocs || 0;
                }

                // Phase distribution chart
                if (stats.phases) {
                    const phases = Object.keys(stats.phases);
                    const counts = phases.map(p => stats.phases[p].count || 0);
                    
                    const data = [{
                        x: phases,
                        y: counts,
                        type: 'bar',
                        marker: {
                            color: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#95A5A6']
                        }
                    }];
                    
                    const layout = {
                        title: 'Events by Attack Phase',
                        xaxis: { title: 'Phase' },
                        yaxis: { title: 'Event Count' }
                    };
                    
                    Plotly.newPlot('phase-chart', data, layout);
                }
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }

        async function generateSamples() {
            try {
                const response = await fetch('/generate-samples', { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    alert('Sample logs generated successfully!');
                } else {
                    alert('Error generating samples: ' + data.error);
                }
            } catch (error) {
                alert('Error generating samples: ' + error);
            }
        }

        // Load statistics on page load
        loadStatistics();
        setInterval(loadStatistics, 5000); // Refresh every 5 seconds
    </script>
</body>
</html>
